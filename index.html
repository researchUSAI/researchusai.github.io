<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>researchusai.com</title>
  <style>
    body {
      background: #EAE0CC;
      color: #4F4334;
      font-family: 'Courier New', monospace;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      font-size: 16px;
      line-height: 24px;
      overflow: hidden;
      position: relative;
    }
    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0) 50%,
        rgba(79, 67, 52, 0.05) 50%
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 9999;
      animation: scanline 8s linear infinite;
    }
    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(4px); }
    }
    @keyframes glow-pulse {
      0%, 100% { 
        box-shadow: 
          0 0 5px rgba(150, 123, 96, 0.4),
          0 0 10px rgba(150, 123, 96, 0.3),
          inset 0 0 5px rgba(150, 123, 96, 0.2);
      }
      50% { 
        box-shadow: 
          0 0 10px rgba(150, 123, 96, 0.6),
          0 0 20px rgba(150, 123, 96, 0.5),
          0 0 30px rgba(150, 123, 96, 0.3),
          inset 0 0 10px rgba(150, 123, 96, 0.3);
      }
    }
    @keyframes border-glow {
      0%, 100% { border-color: #9C8366; }
      50% { border-color: #B7C0A0; }
    }
    /* Cursor: the native browser caret is used, shaped as a blinking block
       (see #input caret-color / caret-shape). The old custom block cursors
       were removed because they mispositioned while typing. */
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    #toolbar {
      flex: 0 0 auto;
      height: var(--toolbar-h, 15vh);
      padding: 0.75em 1ch;
      background: #E0D4BB;
      border-bottom: 2px solid #9C8366;
      display: flex;
      flex-direction: column;
      gap: 0.75em;
      box-shadow: 0 2px 15px rgba(150, 123, 96, 0.3);
      overflow-y: auto;
      overflow-x: hidden;
      box-sizing: border-box;
    }
    #toolbar-row-1,
    #toolbar-row-2 {
      display: flex;
      flex-direction: column;
      gap: 0.75em;
      align-items: stretch;
      width: 100%;
    }
    #toolbar button {
      background: linear-gradient(145deg, #E8DDC6, #DCCEB0);
      color: #4F4334;
      border: 2px solid #9C8366;
      padding: 1em 1.5em;
      font-family: inherit;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      min-height: 48px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 
        0 0 5px rgba(150, 123, 96, 0.8),
        0 0 10px rgba(150, 123, 96, 0.4);
      box-shadow: 
        0 0 8px rgba(150, 123, 96, 0.3),
        inset 0 0 5px rgba(150, 123, 96, 0.1);
      transition: all 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(150, 123, 96, 0.3);
      border-radius: 3px;
    }

    #send-btn {
      animation: glow-pulse 2s infinite;
    }
    #toolbar button:hover {
      background: linear-gradient(145deg, #DCCEB0, #D0BF9C);
      box-shadow: 
        0 0 15px rgba(150, 123, 96, 0.5),
        0 0 25px rgba(150, 123, 96, 0.3),
        inset 0 0 8px rgba(150, 123, 96, 0.2);
      transform: translateY(-1px);
    }
    #toolbar button:active {
      background: linear-gradient(145deg, #D0BF9C, #C4B088);
      box-shadow: 
        0 0 20px rgba(150, 123, 96, 0.6),
        inset 0 0 12px rgba(150, 123, 96, 0.3);
      transform: translateY(0);
    }
    #polarity-btn {
      background: linear-gradient(145deg, #A9B391, #B7C0A0);
      color: #4F4334;
      font-weight: bold;
    }

    #display-container {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      border: 2px solid rgba(150, 123, 96, 0.3);
      border-top: none;
      box-shadow: 
        inset 0 0 25px rgba(150, 123, 96, 0.1),
        0 0 15px rgba(150, 123, 96, 0.15);
    }
    #display {
      flex: 0 0 auto;
      height: var(--display-h, 66%);
      min-height: 40px;
      overflow-y: auto;
      padding: 1em 1ch 1em 1ch;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 1.1em;
      line-height: 1.85;
      box-sizing: border-box;
    }
    #input {
      flex: 1 1 auto;
      min-height: 40px;
      border: none;
      border-top: 2px solid rgba(150, 123, 96, 0.3);
      outline: none;
      background: rgba(208, 191, 156, 0.35);
      color: inherit;
      font-family: inherit;
      font-size: 1.1em;
      line-height: 1.6;
      padding: 0.75em 1ch 4em 1ch;
      caret-color: #4F4334;
      caret-shape: block;
      overflow-y: auto;
      overflow-x: hidden;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
      word-break: break-word;
      box-sizing: border-box;
    }
    #input .input-reverse {
      background: #5A4D3E;
      color: #EAE0CC;
      padding: 0 0.2ch;
      box-shadow: 
        0 0 8px rgba(150, 123, 96, 0.8),
        0 0 15px rgba(150, 123, 96, 0.5);
    }
    #measure {
      position: absolute;
      visibility: hidden;
      font-family: 'Courier New', monospace;
      white-space: pre;
    }
    .reverse-video {
      background: #5A4D3E;
      color: #EAE0CC;
      padding: 0 0.2ch;
      font-size: 1em;
      font-weight: bold;
      box-shadow: 
        0 0 8px rgba(150, 123, 96, 0.8),
        0 0 15px rgba(150, 123, 96, 0.5);
    }
    .config-value {
      color: #4F4334;
      background: #E0D4BB;
      padding: 0 0.5ch;
      cursor: text;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-width: 80ch;
      display: inline;
      border: 1px solid rgba(150, 123, 96, 0.3);
      box-shadow: 
        0 0 5px rgba(150, 123, 96, 0.2),
        inset 0 0 5px rgba(150, 123, 96, 0.1);
    }
    .config-value:focus {
      outline: none;
      border-color: rgba(150, 123, 96, 0.8);
      box-shadow:
        0 0 8px rgba(150, 123, 96, 0.3),
        inset 0 0 5px rgba(150, 123, 96, 0.15);
    }
    .config-value.placeholder {
      color: rgba(150, 123, 96, 0.55);
      font-style: italic;
      font-weight: bold;
      text-shadow: none;
    }
    /* The masked api key is one long run of bullets; break it between any
       characters so it starts inline after the label instead of being pushed
       to the next line. */
    #edit-key {
      word-break: break-all;
    }
    .default-tag {
      color: rgba(150, 123, 96, 0.35);
      font-style: italic;
      text-shadow: none;
      pointer-events: none;
      user-select: none;
      margin-left: 0.5ch;
    }
      height: 1em;
    }
    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(150, 123, 96, 0.4);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(150, 123, 96, 0.8);
    }
    /* Drag handles */
    .drag-handle {
      flex: 0 0 22px;
      width: 100%;
      background: rgba(150, 123, 96, 0.2);
      border-top: 1px solid rgba(150, 123, 96, 0.5);
      border-bottom: 1px solid rgba(150, 123, 96, 0.5);
      cursor: ns-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      touch-action: none;
      transition: background 0.15s, box-shadow 0.15s;
      z-index: 10;
      position: relative;
    }
    .drag-handle:hover, .drag-handle.dragging {
      background: rgba(150, 123, 96, 0.45);
      box-shadow: 
        0 0 10px rgba(150, 123, 96, 0.5),
        inset 0 0 6px rgba(150, 123, 96, 0.3);
    }
    .drag-handle::after {
      content: '━━━━━';
      color: rgba(150, 123, 96, 0.7);
      font-size: 0.75em;
      letter-spacing: 3px;
      text-shadow: 0 0 6px rgba(150, 123, 96, 0.8);
    }
    .message-separator {
      margin: 0.5em 0;
      font-size: 0.75em;
      letter-spacing: 3px;
      color: rgba(150, 123, 96, 0.7);
      text-shadow: 0 0 6px rgba(150, 123, 96, 0.5);
      pointer-events: none;
      user-select: none;
    }
    .message-separator::after {
      content: '━━━━━';
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div id="toolbar-row-1">
      <button id="support-btn" onclick="window.open('https://ko-fi.com/usai','_blank')">Support U.S.A.I</button>
      <button id="export-btn">Export</button>
      <button id="import-btn">Import</button>
      <button id="import-cancel-btn" style="display:none">Cancel</button>
      <button id="import-return-btn" style="display:none">Return to Conversation</button>
      <button id="import-source-btn" style="display:none">Add as Source</button>
      <input type="file" id="import-input" accept=".txt" style="display:none">
      <button id="getkey-btn">Get API Key</button>
      <button id="pastekey-btn">Paste API Key</button>
      <button id="polarity-btn">Short Form</button>

      <button id="clear-btn">Clear</button>
      <button id="back-btn">Back</button>
      <button id="new-btn">New</button>
      <button id="paste-btn">Paste</button>
    </div>
    <div id="toolbar-row-2">
      <button id="send-btn">Send</button>
      <button id="copy-btn">Copy</button>
    </div>
  </div>
  <div class="drag-handle" id="drag-toolbar"></div>
  <div id="display-container">
    <div id="display"></div>
    <div class="drag-handle" id="drag-display"></div>
    <div id="input" contenteditable="true"></div>
    <div id="inline-cursor"></div>
  </div>
  <span id="measure">M</span>

  <script>
    const State = {
      PROBE_RECOVER: 'probe_recover',
      PROBE_WAIT: 'probe_wait',
      PROBE_RECOVER_RESPONSE: 'probe_recover_response',
      PROBE_RECOVER_CONFIRM: 'probe_recover_confirm',
      PROBE_RECOVER_EDIT: 'probe_recover_edit',
      CALIBRATE_ENDPOINT_RECOVER: 'calibrate_endpoint_recover',
      CALIBRATE_MODEL_RECOVER: 'calibrate_model_recover',
      CALIBRATE_CODE_RECOVER: 'calibrate_code_recover',
      CALIBRATE_KEY_RECOVER: 'calibrate_key_recover',
      CALIBRATE_WAIT: 'calibrate_wait',
    };

    class Structure {
      constructor() {
        this.id = `s_${Date.now()}`;
        this.date = new Date().toLocaleDateString();
        this.day = new Date().toLocaleDateString('en-US', { weekday: 'short' });
        this.releaseTime = null;
        this.log = [];
      }
      addInitiation(probe) {
        this.log.push({ type: 'initiation', id: `i_${Date.now()}`, timestamp: Date.now(), probe });
      }
      addResponse(probe) {
        this.log.push({ type: 'response', id: `r_${Date.now()}`, timestamp: Date.now(), probe });
      }
      release() {
        this.releaseTime = new Date().toLocaleTimeString();

        let text = `${this.date} (${this.day})\n`;
        if (this.releaseTime) text += `Released: ${this.releaseTime}\n`;
        text += '\n';

        for (const entry of this.log) {
          const time = new Date(entry.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
          if (entry.type === 'initiation') {
            text += `USER ${time}:\n${entry.probe}\n\n`;
          } else if (entry.type === 'response') {
            text += `LLM ${time}:\n${entry.probe}\n\n`;
          }
        }

        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${this.id}.txt`;
        a.click();
        URL.revokeObjectURL(url);
      }
    }

    class Nexus {
      constructor() {
        this.state = State.PROBE_RECOVER;
        this.structures = [];
        this.currentStructure = new Structure();
        this.stack = [];
        this.localBackend = 'https://researchnexus.onrender.com';
        
        this.modelEndpoint = localStorage.getItem('modelEndpoint') || 'https://api.openai.com';
        this.model = localStorage.getItem('model') || 'gpt-5.4-nano';
        this.apiKey = localStorage.getItem('apiKey') || '';
        this.preference = localStorage.getItem('preference') || '';
        this.truth = localStorage.getItem('truth') === 'true' ? true : false;

        // Unified config-field definitions. All four fields behave identically:
        // a placeholder is shown when unset, it clears on focus, and whatever is
        // typed is saved to disk (or removed, reverting to the fallback).
        this.configFields = {
          'edit-preference': { prop: 'preference',    storeKey: 'preference',    placeholder: 'make me sound like...', fallback: '',                      secret: false },
          'edit-key':        { prop: 'apiKey',        storeKey: 'apiKey',        placeholder: 'enter your api key',    fallback: '',                      secret: true  },
          'edit-endpoint':   { prop: 'modelEndpoint', storeKey: 'modelEndpoint', placeholder: 'https://api.openai.com', fallback: 'https://api.openai.com', secret: false },
          'edit-model':      { prop: 'model',         storeKey: 'model',         placeholder: 'gpt-5.4-nano',          fallback: 'gpt-5.4-nano',          secret: false },
        };
        
        this.dotCount = 0;
        this.dotInterval = null;
        this.display = document.getElementById('display');
        this.input = document.getElementById('input');
        this.inlineCursor = document.getElementById('inline-cursor');
        this.measure = document.getElementById('measure');
        this.backdoorMode = false;
        this.lastInitiation = null;
        this.lastActionWasFileDrop = false;
        this.importMode = null;
        this.keyFieldBeingEdited = false;

        // Restore persisted session
        try {
          const savedStack = localStorage.getItem('nexus_stack');
          const savedStructures = localStorage.getItem('nexus_structures');
          if (savedStack) this.stack = JSON.parse(savedStack);
          if (savedStructures) {
            const raw = JSON.parse(savedStructures);
            this.structures = raw.map(s => {
              const st = new Structure();
              st.id = s.id;
              st.date = s.date;
              st.day = s.day;
              st.log = s.log;
              return st;
            });
          }
          const savedCurrent = localStorage.getItem('nexus_current_structure');
          if (savedCurrent) {
            const sc = JSON.parse(savedCurrent);
            this.currentStructure = new Structure();
            this.currentStructure.id = sc.id;
            this.currentStructure.date = sc.date;
            this.currentStructure.day = sc.day;
            this.currentStructure.log = sc.log;
          }
          if (this.stack.length > 0 || this.structures.length > 0) {
            this.state = State.PROBE_RECOVER;
          }
        } catch (_) {}

        this.setupEvents();
        this.setupDragHandles();
        this.updateDimensions();
        
        this.updatePolarityButton();
      }

      setupDragHandles() {
        const toolbar = document.getElementById('toolbar');
        const display = document.getElementById('display');
        const dragToolbar = document.getElementById('drag-toolbar');
        const dragDisplay = document.getElementById('drag-display');

        const savedToolbarH = localStorage.getItem('toolbarH');
        const savedDisplayPct = localStorage.getItem('displayPct');
        if (savedToolbarH) toolbar.style.height = savedToolbarH + 'px';
        if (savedDisplayPct) display.style.height = savedDisplayPct + '%';

        const makeDraggable = (handle, onDrag) => {
          let startY = 0;
          let dragging = false;

          const start = (y) => {
            startY = y;
            dragging = true;
            handle.classList.add('dragging');
            document.body.style.userSelect = 'none';
          };

          const move = (y) => {
            if (!dragging) return;
            const delta = y - startY;
            startY = y;
            onDrag(delta);
          };

          const end = () => {
            dragging = false;
            handle.classList.remove('dragging');
            document.body.style.userSelect = '';
          };

          handle.addEventListener('mousedown', (e) => { e.preventDefault(); start(e.clientY); });
          document.addEventListener('mousemove', (e) => move(e.clientY));
          document.addEventListener('mouseup', end);

          handle.addEventListener('touchstart', (e) => { e.preventDefault(); start(e.touches[0].clientY); }, { passive: false });
          document.addEventListener('touchmove', (e) => { if (dragging) { e.preventDefault(); move(e.touches[0].clientY); } }, { passive: false });
          document.addEventListener('touchend', end);
        };

        makeDraggable(dragToolbar, (delta) => {
          const current = toolbar.getBoundingClientRect().height;
          const newH = Math.max(40, Math.min(window.innerHeight * 0.6, current + delta));
          toolbar.style.height = newH + 'px';
          localStorage.setItem('toolbarH', Math.round(newH));
        });

        makeDraggable(dragDisplay, (delta) => {
          const container = document.getElementById('display-container');
          const containerH = container.getBoundingClientRect().height;
          const currentH = display.getBoundingClientRect().height;
          const newH = Math.max(40, Math.min(containerH - 80, currentH + delta));
          const pct = (newH / containerH) * 100;
          display.style.height = pct + '%';
          localStorage.setItem('displayPct', pct.toFixed(2));
        });
      }

      setupEvents() {
        window.addEventListener('resize', () => this.updateDimensions());

        this.input.addEventListener('click', () => {
          this.updateInlineCursor();
        });

        this.input.addEventListener('keyup', () => {
          this.updateInlineCursor();
        });

        this.input.addEventListener('focus', () => {
          this.updateInlineCursor();
        });

        this.input.addEventListener('blur', () => {
          this.inlineCursor.style.display = 'none';
        });

        this.input.addEventListener('paste', (e) => {
          e.preventDefault();
          const text = (e.clipboardData || window.clipboardData).getData('text/plain');
          if (text) {
            document.execCommand('insertText', false, text);
          }
        });

        document.addEventListener('selectionchange', () => {
          if (document.activeElement === this.input) {
            this.updateInlineCursor();
          }
        });

        document.addEventListener('keydown', async (e) => {
          if (e.key === 'Enter' && e.shiftKey) {
            e.preventDefault();
            document.execCommand('insertText', false, ' '.repeat(50));
          } else if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const cmd = this.input.textContent.trim();
            this.input.innerHTML = '';
            if (cmd) await this.process(cmd);
          } else if ((e.metaKey || e.ctrlKey) && (e.key === 'c' || e.key === 'C')) {
            return;
          } else if ((e.metaKey || e.ctrlKey) && (e.key === 'v' || e.key === 'V')) {
            return;
          } else if ((e.metaKey || e.ctrlKey) && (e.key === 'x' || e.key === 'X')) {
            return;
          } else if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
            return;
          } else {
            return;
          }
        });

        document.getElementById('export-btn').addEventListener('click', () => {
          const btn = document.getElementById('export-btn');
          if (this.currentStructure) {
            this.currentStructure.release();
            btn.textContent = 'Exported!';
            setTimeout(() => {
              btn.textContent = 'Export';
            }, 1000);
          }
        });

        const showImportChoices = (show) => {
          document.getElementById('import-btn').style.display = show ? 'none' : '';
          document.getElementById('import-return-btn').style.display = show ? '' : 'none';
          document.getElementById('import-source-btn').style.display = show ? '' : 'none';
          document.getElementById('import-cancel-btn').style.display = show ? '' : 'none';
        };

        document.getElementById('import-btn').addEventListener('click', () => {
          showImportChoices(true);
        });

        document.getElementById('import-return-btn').addEventListener('click', () => {
          this.importMode = 'return';
          showImportChoices(false);
          document.getElementById('import-input').value = '';
          document.getElementById('import-input').click();
        });

        document.getElementById('import-source-btn').addEventListener('click', () => {
          this.importMode = 'source';
          showImportChoices(false);
          document.getElementById('import-input').value = '';
          document.getElementById('import-input').click();
        });

        document.getElementById('import-cancel-btn').addEventListener('click', () => {
          showImportChoices(false);
        });

        document.getElementById('import-input').addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            const text = ev.target.result;
            const structure = this.parseTxt(text);
            if (!structure || structure.log.length === 0) {
              alert('Could not read file.');
              return;
            }
            if (this.importMode === 'return') {
              // Return: restore as active session
              this.structures = [];
              this.stack = [];
              this.currentStructure = new Structure();
              this.currentStructure.date = structure.date;
              this.currentStructure.day = structure.day;
              this.currentStructure.log = structure.log;
              for (const entry of structure.log) {
                if (entry.type === 'initiation') {
                  this.stack.push(`user:\n${entry.probe}`);
                } else if (entry.type === 'response') {
                  this.stack.push(`llm:\n${entry.probe}`);
                }
              }
              this.lastActionWasFileDrop = true;
              this.state = State.PROBE_RECOVER;
            } else {
              // Add as source: push into structures as released context
              this.structures.push(structure);
              this.lastActionWasFileDrop = true;
              this.state = State.PROBE_RECOVER;
            }
            this.importMode = null;
            this.render();
            this.scrollToBottom();
          };
          reader.readAsText(file);
        });

        document.getElementById('back-btn').addEventListener('click', () => {
          const backBtn = document.getElementById('back-btn');
          backBtn.style.background = '#5A4D3E';
          backBtn.style.color = '#EAE0CC';
          setTimeout(() => {
            backBtn.style.background = '';
            backBtn.style.color = '';
          }, 150);
          if (this.lastActionWasFileDrop && this.structures.length > 0) {
            this.structures.pop();
            this.lastActionWasFileDrop = false;
            this.state = State.PROBE_RECOVER;
            this.render();
            this.scrollToBottom();
          } else if (this.stack.length > 0) {
            // Pop llm response if present
            if (this.stack[this.stack.length - 1].startsWith('llm:\n')) {
              this.stack.pop();
              if (this.currentStructure.log.length > 0 && this.currentStructure.log[this.currentStructure.log.length - 1].type === 'response') {
                this.currentStructure.log.pop();
              }
            }
            // Pop user query and load it into input
            let lastQuery = '';
            if (this.stack.length > 0 && this.stack[this.stack.length - 1].startsWith('user:\n')) {
              lastQuery = this.stack[this.stack.length - 1].slice('user:\n'.length);
              this.stack.pop();
              if (this.currentStructure.log.length > 0 && this.currentStructure.log[this.currentStructure.log.length - 1].type === 'initiation') {
                this.currentStructure.log.pop();
              }
            }
            this._persistSession();
            this.state = State.PROBE_RECOVER;
            this.render();
            // Load the last query directly into the input field
            if (lastQuery) {
              this.input.textContent = lastQuery;
              this.normalizeInput();
            }
            this.scrollToBottom();
          }
        });


        document.getElementById('new-btn').addEventListener('click', () => {
          if (confirm('Would you like to clear your conversation?')) {
            this._clearSession();
            this.input.innerHTML = '';
            this.render();
            this.scrollToBottom();
          }
        });

        document.getElementById('polarity-btn').addEventListener('click', () => {
          this.truth = !this.truth;
          this.updatePolarityButton();
          localStorage.setItem('truth', this.truth.toString());
          this.render();
        });


        document.getElementById('clear-btn').addEventListener('click', () => {
          const btn = document.getElementById('clear-btn');
          this.input.innerHTML = '';

          btn.textContent = 'Cleared!';

            btn.textContent = 'Clear';
          }, 1000);
        });

        document.getElementById('paste-btn').addEventListener('click', async () => {

          if (btn.textContent === 'Pasted!') return;
          
          try {
            const text = await navigator.clipboard.readText();
            if (text) {
              const current = this.input.textContent || '';
              const separator = current ? '\n\n' : '';
              this.input.textContent = current + separator + text;
              this.normalizeInput();
              
              btn.textContent = 'Pasted!';
              setTimeout(() => {
                btn.textContent = 'Paste';
              }, 1000);
            }
          } catch (err) {

          }
        });

        document.getElementById('send-btn').addEventListener('click', async () => {
          const btn = document.getElementById('send-btn');

          if (content) {

              btn.style.color = '';

        document.getElementById('copy-btn').addEventListener('click', () => {
          const btn = document.getElementById('copy-btn');
          
          if (btn.textContent === 'Copied!') return;
          
          let lastResponse = '';
          for (let i = this.stack.length - 1; i >= 0; i--) {
            if (this.stack[i].startsWith('llm:\n')) {
              lastResponse = this.stack[i].slice('llm:\n'.length);
              break;
            }
          }
          
          if (lastResponse) {

            try {
              document.execCommand('copy');

              btn.textContent = 'Copied!';

                btn.textContent = 'Copy';

            } catch (err) {

        });

        
        document.getElementById('getkey-btn').addEventListener('click', () => {
          window.open('https://platform.openai.com', '_blank');
        });

        
        document.getElementById('pastekey-btn').addEventListener('click', async () => {
          const btn = document.getElementById('pastekey-btn');
          if (btn.textContent === 'Pasted!') return;
          try {
            const text = await navigator.clipboard.readText();
            if (text) {
              const trimmedKey = text.trim();
              if (trimmedKey) {
                this.apiKey = trimmedKey;
                localStorage.setItem('apiKey', this.apiKey);
                const keyEl = document.getElementById('edit-key');
                if (keyEl) {
                  keyEl.textContent = trimmedKey;
                  keyEl.setAttribute('data-actual-key', trimmedKey);
                }
                this.render();
                btn.textContent = 'Pasted!';
                setTimeout(() => {
                  btn.textContent = 'Paste API Key';
                }, 1000);
              }
            }
          } catch (err) {
            alert('Paste failed. Please copy your API key first, then try again.');
          }
        });

        // Unified handling for every config field (preference, key, endpoint,
        // model): clear the placeholder on focus, persist on input, restore the
        // placeholder / re-mask on blur. Driven by this.configFields.
        const caretToEnd = (el) => {
          const range = document.createRange();
          range.selectNodeContents(el);
          range.collapse(false);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        };

        const commitField = (f, el) => {
          let val = el.textContent.trim();
          if (val === f.placeholder) val = '';
          if (val === '' || val === 'NULL') {
            this[f.prop] = f.fallback;
            localStorage.removeItem(f.storeKey);
          } else {
            this[f.prop] = val;
            localStorage.setItem(f.storeKey, val);
            if (f.secret) el.setAttribute('data-actual-key', val);
          }
        };

        this.display.addEventListener('focus', (e) => {
          const f = this.configFields[e.target.id];
          if (!f) return;
          if (f.secret) {
            this.keyFieldBeingEdited = true;
            const actualKey = e.target.getAttribute('data-actual-key');
            if (e.target.textContent.trim().match(/^•+$/) && actualKey) {
              e.target.textContent = actualKey;
            }
          }
          if (e.target.classList.contains('placeholder')) {
            e.target.classList.remove('placeholder');
            e.target.textContent = '';
          }
          caretToEnd(e.target);
        }, true);

        this.display.addEventListener('input', (e) => {
          const f = this.configFields[e.target.id];
          if (!f) return;
          commitField(f, e.target);
        }, true);

        this.display.addEventListener('blur', (e) => {
          const f = this.configFields[e.target.id];
          if (!f) return;
          if (f.secret) this.keyFieldBeingEdited = false;
          commitField(f, e.target);
          // Re-render so the placeholder, key masking and default/required tags
          // are restored consistently. Preserve any text being composed.
          const savedInput = this.input.textContent;
          this.render();
          this.input.textContent = savedInput;
        }, true);
      }


      updatePolarityButton() {
        const btn = document.getElementById('polarity-btn');
        btn.textContent = this.truth ? 'Short Form' : 'Long Form';
      }

      normalizeInput() {
        // Place the caret at the end of the input. No reverse-video span
        // wrapping and no innerHTML rewrite, so the browser's native undo,
        // select-all, cut and selection highlight all keep working.
        if (!this.input.textContent) return;
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(this.input);
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
      }

      updateDimensions() {
        // CHARS_PER_LINE = how many monospace characters span the viewport
        // width. Higher => more characters per line => smaller text. Lower =>
        // fewer characters per line => larger text. This is the knob you tune.
        const CHARS_PER_LINE = 80;
        // Clamp the result so text never collapses to an unreadable size on a
        // narrow/collapsed window (or balloon on a very wide one).
        const MIN_FONT_PX = 15;
        const MAX_FONT_PX = 24;

        this.measure.style.fontSize = '100px';
        const measuredWidth = this.measure.offsetWidth;
        const pixelsPerChar = measuredWidth / 1;
        const rawFontSize = (window.innerWidth / CHARS_PER_LINE) * (100 / pixelsPerChar);
        const newFontSize = Math.max(MIN_FONT_PX, Math.min(MAX_FONT_PX, rawFontSize));
        const newLineHeight = newFontSize * 1.6;
        document.body.style.fontSize = `${newFontSize}px`;
        document.body.style.lineHeight = `${newLineHeight}px`;
        setTimeout(() => this.updateInlineCursor(), 0);
      }

      startWait() {
        this.dotCount = 0;
        if (this.dotInterval) clearInterval(this.dotInterval);
        this.dotInterval = setInterval(() => {
          this.dotCount = (this.dotCount + 1) % 4;
          this.render();
        }, 600);
      }

      stopWait() {
        if (this.dotInterval) {
          clearInterval(this.dotInterval);
          this.dotInterval = null;
        }
        this.dotCount = 0;
      }

      scrollToBottom() {
        this.display.scrollTop = this.display.scrollHeight;
      }

      updateInlineCursor() {
        // No-op: the input now uses the native browser caret, which positions
        // itself correctly in every case. The old floating cursor is kept
        // hidden.
        if (this.inlineCursor) this.inlineCursor.style.display = 'none';
        if (this.input) this.input.classList.remove('has-inline-cursor');
      }

      formatStructures() {
        if (this.structures.length === 0) return '';
        return this.structures.map((s, i) => {
          const preview = s.log.length > 0 ? s.log[0].probe.substring(0, 20) : 'empty';
          return `[${i}]: [${s.date}] [${s.day}] [${s.releaseTime || 'active'}] [${preview}...]`;
        }).join('\n');
      }

      parseTxt(text) {
        const structure = new Structure();
        const lines = text.split('\n');
        // Parse header line: "3/13/2026 (Fri)"
        const headerMatch = lines[0] && lines[0].match(/^(.+?)\s+\((\w+)\)/);
        if (headerMatch) {
          structure.date = headerMatch[1].trim();
          structure.day = headerMatch[2].trim();
        }
        // Parse release time: "Released: 2:45:00 PM"
        const releasedMatch = lines[1] && lines[1].match(/^Released:\s+(.+)/);
        if (releasedMatch) {
          structure.releaseTime = releasedMatch[1].trim();
        }
        // Parse turns
        const entryPattern = /^(USER|LLM) \d{1,2}:\d{2} (?:AM|PM):$/;
        let currentType = null;
        let currentLines = [];
        const flush = () => {
          if (!currentType || currentLines.length === 0) return;
          const probe = currentLines.join('\n').replace(/\n+$/, '');
          if (probe) {
            structure.log.push({
              type: currentType === 'USER' ? 'initiation' : 'response',
              id: `${currentType === 'USER' ? 'i' : 'r'}_${Date.now()}_${Math.random()}`,
              timestamp: Date.now(),
              probe
            });
          }
          currentLines = [];
        };
        for (let i = 2; i < lines.length; i++) {
          const line = lines[i];
          if (entryPattern.test(line.trim())) {
            flush();
            currentType = line.trim().startsWith('USER') ? 'USER' : 'LLM';
          } else if (currentType !== null) {
            currentLines.push(line);
          }
        }
        flush();
        return structure;
      }

      formatStack() {
        return this.stack.map(line => {
          if (line.startsWith('user:\n')) {
            const probe = line.slice('user:\n'.length);
            return '<span class="reverse-video">post:</span>\n' + probe + '<div class="message-separator"></div>';
          } else if (line.startsWith('llm:\n')) {
            const response = line.slice('llm:\n'.length);
            const htmlResponse = response.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
            return '<span class="reverse-video">reply:</span>\n' + htmlResponse + '<div class="message-separator"></div>';
          }
          return line;
        }).join('');
      }



      _persistSession() {
        try {
          localStorage.setItem('nexus_stack', JSON.stringify(this.stack));
          localStorage.setItem('nexus_structures', JSON.stringify(this.structures.map(s => ({
            id: s.id, date: s.date, day: s.day, log: s.log
          }))));
          localStorage.setItem('nexus_current_structure', JSON.stringify({
            id: this.currentStructure.id,
            date: this.currentStructure.date,
            day: this.currentStructure.day,
            log: this.currentStructure.log
          }));
        } catch (_) {}
      }

      _clearSession() {
        this.structures = [];
        this.currentStructure = new Structure();
        this.stack = [];
        this.lastInitiation = null;
        this.lastActionWasFileDrop = false;
        this.state = State.PROBE_RECOVER;
        try {
          localStorage.removeItem('nexus_stack');
          localStorage.removeItem('nexus_structures');
          localStorage.removeItem('nexus_current_structure');
        } catch (_) {}
      }

      async coordinate(probe) {

        // Build proper messages array
        const messages = [];
        for (const structure of this.structures) {
          for (const entry of structure.log) {
            if (entry.type === 'initiation') {
              messages.push({ role: 'user', content: entry.probe });
            } else if (entry.type === 'response') {
              messages.push({ role: 'assistant', content: entry.probe });
            }
          }
        }
        for (const line of this.stack) {
          if (line.startsWith('user:\n')) {
            messages.push({ role: 'user', content: line.slice('user:\n'.length) });
          } else if (line.startsWith('llm:\n')) {
            messages.push({ role: 'assistant', content: line.slice('llm:\n'.length) });
          }
        }

        try {
          const response = await fetch(`${this.localBackend}/generate_prompt`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages,
              truth: this.truth,
              toxic: 'positive',
              sentence_count: 'off',
              call_to_action: false,
              emojis: false,
              preference: this.preference,
              base_url: this.modelEndpoint,
              api_key: this.apiKey,
              model: this.model
            })
          });

          if (!response.ok) {
            const err = await response.json();
            return `[ERROR: ${err.error || 'Backend failed'}]`;
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();

          // Typewriter reveal. Network chunks (token bursts) fill a queue; a
          // timer drains it one character per tick, so the response appears
          // letter-by-letter at a steady cadence no matter how the bytes arrive.
          const TYPE_MS = 8;    // ms per character
          let queue = '';
          let streamDone = false;
          let hasAddedHeader = false;

          const reveal = new Promise((resolve) => {
            const timer = setInterval(() => {
              if (queue.length) {
                const ch = queue[0];
                queue = queue.slice(1);
                if (!hasAddedHeader) {
                  this.stack.push(`llm:\n${ch}`);
                  hasAddedHeader = true;
                } else {
                  this.stack[this.stack.length - 1] += ch;
                }
                this.render();
                this.scrollToBottom();
              } else if (streamDone) {
                clearInterval(timer);
                resolve();
              }
            }, TYPE_MS);
          });

          const pump = (async () => {
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              const chunk = decoder.decode(value, { stream: true });
              if (chunk) queue += chunk;
            }
            streamDone = true;
          })();

          await Promise.all([pump, reveal]);

          if (!hasAddedHeader) this.stack.push('llm:\n');

          const completeResponse = this.stack[this.stack.length - 1].slice('llm:\n'.length);
          this.currentStructure.addResponse(completeResponse);
          this._persistSession();

          return completeResponse;
        } catch (e) {
          return `[ERROR: ${e.message || 'Network failure'}]`;
        }
      }

      render() {
        let output = '';
        const structures = this.formatStructures();
        let blockInput = false;

        // Build all four config fields uniformly. A field is "unset" when its
        // value equals its fallback (or is empty); unset fields show their
        // placeholder in placeholder style. Persistence happens live in the
        // field handlers, so render only reflects current state.
        const fieldRow = (id, label, tagWhenUnset) => {
          const f = this.configFields[id];
          const value = this[f.prop];
          const unset = !value || value === f.fallback;
          const cls = 'config-value' + (unset ? ' placeholder' : '');
          let shown;
          if (unset)         shown = f.placeholder;
          else if (f.secret) shown = '•'.repeat(value.length);
          else               shown = value;
          const extra = f.secret ? ' data-actual-key="' + (value || '') + '"' : '';
          const tag = (unset && tagWhenUnset) ? '<span class="default-tag">' + tagWhenUnset + '</span>' : '';
          return '<span class="reverse-video">' + label + '</span> <span id="' + id +
                 '" class="' + cls + '" contenteditable="true"' + extra + '>' + shown + '</span>' + tag + '\n';
        };

        output += fieldRow('edit-preference', 'bias:', '');
        output += fieldRow('edit-key', 'api key:', '[required]');
        output += fieldRow('edit-endpoint', 'endpoint:', '[default]');
        output += fieldRow('edit-model', 'model:', '[default]');
        output += '<div class="message-separator"></div>';

        switch(this.state) {
          case State.PROBE_RECOVER:
          case State.PROBE_RECOVER_RESPONSE:
            if (structures) output += structures + '\n';
            if (this.stack.length > 0) output += this.formatStack();
            break;
          case State.PROBE_WAIT:
            if (structures) output += structures + '\n';
            if (this.stack.length > 0) {
              output += this.formatStack();
            } else {
              output += '<span class="reverse-video">post:' + (this.currentProbe ? '\n' + this.currentProbe : '') + '</span><div class="message-separator"></div>';
            }
            blockInput = true;
            break;
          case State.PROBE_RECOVER_EDIT:
            if (structures) output += structures + '\n';
            if (this.stack.length > 0) output += this.formatStack();
            break;
          case State.CALIBRATE_ENDPOINT_RECOVER:
            output += '/route\n<span class="reverse-video">endpoint: ' + (this.modelEndpoint || 'https://api.openai.com') + '</span>';
            break;
          case State.CALIBRATE_MODEL_RECOVER:
            output += '/route\n<span class="reverse-video">model: ' + (this.model || 'gpt-5.4-nano') + '</span>';
            break;
          case State.CALIBRATE_KEY_RECOVER:
            output += '/route\n<span class="reverse-video">api key: ' + (this.apiKey || 'NULL') + '</span>';
            break;
          case State.CALIBRATE_WAIT:
            output += 'processing...';
            blockInput = true;
            break;
        }

        this.display.innerHTML = output;

        this.input.contentEditable = !blockInput;
        if (!blockInput) {
          if (this.state === State.PROBE_RECOVER_EDIT && this.lastInitiation) {
            this.input.textContent = this.lastInitiation;
          } else {
            this.input.textContent = '';
          }
        }
      }

      async process(cmd) {
        const cmdLower = cmd.toLowerCase();

        switch(this.state) {
          case State.PROBE_RECOVER:
          case State.PROBE_RECOVER_RESPONSE:
            if (cmdLower === '/release') {
              if (this.currentStructure) {
                this.currentStructure.release();
                return;
              }
            } else if (cmdLower === '/recover') {
              if (this.lastActionWasFileDrop && this.structures.length > 0) {
                this.structures.pop();
                this.lastActionWasFileDrop = false;
                this.state = State.PROBE_RECOVER;
              } else if (this.stack.length > 0) {
                if (confirm('Go back and edit the last message?')) {
                  if (this.stack.length > 0 && this.currentStructure.log.length > 0) {
                    if (this.stack[this.stack.length - 1].startsWith('llm:\n')) {
                      this.stack.pop();
                    }
                    if (this.currentStructure.log[this.currentStructure.log.length - 1].type === 'response') {
                      this.currentStructure.log.pop();
                    }
                    if (this.stack.length > 0 && this.stack[this.stack.length - 1].startsWith('user:\n')) {
                      this.lastInitiation = this.stack[this.stack.length - 1].slice('user:\n'.length);
                      this.stack.pop();
                    } else {
                      this.lastInitiation = '';
                    }
                    if (this.currentStructure.log.length > 0 && this.currentStructure.log[this.currentStructure.log.length - 1].type === 'initiation') {
                      this.currentStructure.log.pop();
                    }
                    this.state = State.PROBE_RECOVER_EDIT;
                  } else {
                    this.lastInitiation = '';
                    this.state = State.PROBE_RECOVER;
                  }
                } else {
                  this.lastInitiation = null;
                  this.state = State.PROBE_RECOVER;
                }
              }
            } else if (cmdLower === '/polarity') {
              this.truth = !this.truth;
              document.getElementById('polarity-btn').textContent = this.truth ? 'Short Response' : 'Long Response';
              localStorage.setItem('truth', this.truth.toString());
              this.state = State.PROBE_RECOVER;
            } else if (cmdLower === '/endpoint') {
              this.state = State.CALIBRATE_ENDPOINT_RECOVER;
            } else if (cmdLower === '/model') {
              this.state = State.CALIBRATE_MODEL_RECOVER;
            } else if (cmdLower === '/key') {
              this.state = State.CALIBRATE_KEY_RECOVER;
            } else if (cmdLower.startsWith('/')) {
              return;
            } else {
              this.stack.push(`user:\n${cmd}`);
              this.currentStructure.addInitiation(cmd);
              this._persistSession();
              this.lastActionWasFileDrop = false;
              this.state = State.PROBE_WAIT;
              this.render();
              this.scrollToBottom();
              const dc = document.getElementById('display-container');
              if (dc) {
                dc.style.borderColor = 'rgba(150, 123, 96, 0.9)';
                setTimeout(() => { dc.style.borderColor = ''; }, 150);
              }
              this.startWait();
              this.currentProbe = cmd;
              const response = await this.coordinate(cmd);
              this.stopWait();
              if (response === null) break;
              this.state = State.PROBE_RECOVER_RESPONSE;
              this.lastInitiation = null;
            }
            break;

          case State.PROBE_RECOVER_EDIT:
            if (cmdLower === '/release') {
              if (this.currentStructure) {
                this.currentStructure.release();
                this.lastInitiation = null;
                return;
              }
            } else if (cmdLower === '/recover') {
              this.lastInitiation = null;
              this.state = State.PROBE_RECOVER;
            } else if (cmdLower === '/polarity') {
              this.truth = !this.truth;
              document.getElementById('polarity-btn').textContent = this.truth ? 'Short Response' : 'Long Response';
              localStorage.setItem('truth', this.truth.toString());
              this.lastInitiation = null;
              this.state = State.PROBE_RECOVER;
            } else if (cmdLower === '/endpoint') {
              this.lastInitiation = null;
              this.state = State.CALIBRATE_ENDPOINT_RECOVER;
            } else if (cmdLower === '/model') {
              this.lastInitiation = null;
              this.state = State.CALIBRATE_MODEL_RECOVER;
            } else if (cmdLower === '/key') {
              this.lastInitiation = null;
              this.state = State.CALIBRATE_KEY_RECOVER;
            } else if (cmdLower.startsWith('/')) {
              return;
            } else {
              if (cmd) {
                this.stack.push(`user:\n${cmd}`);
                this.currentStructure.addInitiation(cmd);
                this._persistSession();
              }
              this.lastActionWasFileDrop = false;
              this.state = State.PROBE_WAIT;
              this.render();
              this.scrollToBottom();
              const dc = document.getElementById('display-container');
              if (dc) {
                dc.style.borderColor = 'rgba(150, 123, 96, 0.9)';
                setTimeout(() => { dc.style.borderColor = ''; }, 150);
              }
              this.startWait();
              this.currentProbe = cmd;
              const response = await this.coordinate(cmd);
              this.stopWait();
              if (response === null) break;
              this.state = State.PROBE_RECOVER_RESPONSE;
              this.lastInitiation = null;
            }
            break;

          case State.CALIBRATE_ENDPOINT_RECOVER:
            if (cmdLower === '/route') {
              this.state = State.PROBE_RECOVER;
            } else {
              this.modelEndpoint = cmd;
              this.backdoorMode = (cmd === 'backdoor');
              this.state = State.CALIBRATE_WAIT;
              setTimeout(() => {
                this.stopWait();
                this.state = State.PROBE_RECOVER;
                this.render();
              }, 3000);
            }
            break;

          case State.CALIBRATE_MODEL_RECOVER:
            if (cmdLower === '/route') {
              this.state = State.PROBE_RECOVER;
            } else {
              this.model = cmd;
              this.state = State.CALIBRATE_WAIT;
              setTimeout(() => {
                this.stopWait();
                this.state = State.PROBE_RECOVER;
                this.render();
              }, 3000);
            }
            break;

          case State.CALIBRATE_KEY_RECOVER:
            if (cmdLower === '/route') {
              this.state = State.PROBE_RECOVER;
            } else {
              this.apiKey = cmd;
              this.state = State.CALIBRATE_WAIT;
              setTimeout(() => {
                this.stopWait();
                this.state = State.PROBE_RECOVER;
                this.render();
              }, 3000);
            }
            break;

          case State.CALIBRATE_WAIT:
            this.state = State.PROBE_RECOVER;
            break;
        }
        this.render();
      }
    }

    const nexus = new Nexus();
    nexus.render();
  </script>
</body>
